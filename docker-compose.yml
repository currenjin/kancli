services:
  kancli:
    build: .
    container_name: kancli
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - KANCLI_CONFIG_FILE=/data/kancli-config.json
      - CLAUDE_BIN=claude
    volumes:
      - ./data:/data
      # kancli가 제어할 프로젝트 루트를 마운트
      - ../:/workspace
      # Claude 인증/설정 사용 시(선택)
      - ~/.claude:/root/.claude
    restart: unless-stopped
