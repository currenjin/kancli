<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevFlow</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: Inter, system-ui, -apple-system, sans-serif; margin: 0; background: #f1f5f9; color: #0f172a; }
    .container { max-width: 1560px; margin: 0 auto; padding: 20px; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    input, button, select {
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      font-size: 13px;
      background: #fff;
    }
    input, select { min-height: 36px; }
    button { cursor: pointer; transition: .16s ease; font-weight: 600; }
    button:hover { border-color: #94a3b8; background: #f8fafc; }
    button:active { transform: translateY(1px); }
    .primary { background: #2563eb; color: white; border-color: #1d4ed8; }
    .primary:hover { background: #1d4ed8; border-color: #1e40af; }
    .danger { background: #dc2626; color: white; border-color: #b91c1c; }
    .danger:hover { background: #b91c1c; border-color: #991b1b; }

    .card { background: white; border: 1px solid #dbe5f1; border-radius: 14px; padding: 14px; box-shadow: 0 1px 2px rgba(2, 6, 23, 0.04); }
    .grid { display: grid; gap: 12px; margin-top: 12px; overflow-x: auto; align-items: start; padding-bottom: 8px; }

    .column { min-height: 200px; max-height: calc(100vh - 180px); overflow: auto; padding-bottom: 8px; }
    .column-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      position: sticky;
      top: -1px;
      z-index: 2;
      background: linear-gradient(180deg, #fff 80%, rgba(255,255,255,0.92));
      padding-bottom: 8px;
      border-bottom: 1px solid #eff6ff;
      margin-bottom: 2px;
    }

    .ticket { margin-top: 10px; border: 1px solid #dbe5f1; border-radius: 12px; padding: 11px; background: #fff; }
    .ticket.done { border-color: #86efac; background: #f0fdf4; }
    .ticket.stale { border-color: #f59e0b; box-shadow: 0 0 0 1px #fcd34d inset; }
    .ticket.pinned { border-left: 4px solid #ef4444; }

    .ticket-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .ticket-id { font-weight: 800; font-size: 14px; letter-spacing: 0.2px; }
    .ticket-skill { font-size: 12px; color: #1d4ed8; font-weight: 700; background: #dbeafe; border-radius: 999px; padding: 2px 8px; }
    .ticket-main-meta { margin-top: 6px; display: grid; gap: 4px; }

    .muted { color: #64748b; font-size: 12px; }
    .strong-line { font-size: 12px; color: #334155; }
    .strong-line b { color: #0f172a; }
    .badge { font-size: 11px; border-radius: 999px; padding: 2px 8px; background: #e2e8f0; font-weight: 700; }
    .badge.done { background: #bbf7d0; color: #166534; }
    .badge.warn { background: #fde68a; color: #92400e; }
    .badge.danger { background: #fecaca; color: #991b1b; }

    .actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
    .actions .danger { margin-left: auto; }
    .pending { background: #faf5ff; border: 1px solid #e9d5ff; border-radius: 8px; padding: 9px; margin-top: 9px; }
    .pending-title { font-size: 12px; font-weight: 700; color: #6b21a8; margin-bottom: 6px; }
    .artifact { font: 11px ui-monospace, SFMono-Regular, Menlo, monospace; margin-top: 6px; color: #334155; }
    .log { margin-top: 8px; max-height: 180px; overflow: auto; background: #0f172a; color: #e2e8f0; padding: 8px; border-radius: 6px; font: 11px/1.5 monospace; white-space: pre-wrap; }

    details.meta { margin-top: 8px; border-top: 1px dashed #dbe5f1; padding-top: 7px; }
    details.meta > summary { list-style: none; cursor: pointer; color: #475569; font-size: 12px; font-weight: 600; }
    details.meta > summary::-webkit-details-marker { display:none; }

    .column-empty {
      margin-top: 12px;
      color: #94a3b8;
      font-size: 12px;
      border: 1px dashed #cbd5e1;
      border-radius: 10px;
      padding: 14px;
      background: #f8fafc;
      text-align: center;
    }

    .pipeline-item { display:flex; align-items:center; gap:6px; margin-top:6px; }
    .timeline-list { max-height: 220px; overflow:auto; margin-top:8px; border:1px solid #e2e8f0; border-radius:8px; padding:8px; background: #f8fafc; }
    .timeline-item { padding:6px 0; border-bottom:1px dashed #e2e8f0; font-size:12px; }
    .timeline-item:last-child { border-bottom:none; }
    .wip-input { width:68px; font-size:12px; padding:4px 6px; }
    .pipeline-item { display:flex; align-items:center; gap:6px; padding:6px 8px; border:1px solid #e2e8f0; border-radius:8px; margin-top:6px; background:#fff; }
    .pipeline-item[draggable='true'] { cursor: grab; }
    .pipeline-item.dragging { opacity: .5; }
    .pipeline-item.drop-target { border-color:#2563eb; box-shadow:0 0 0 2px rgba(37,99,235,.15) inset; }

    @media (max-width: 1200px) {
      .container { padding: 14px; }
      .grid { gap: 10px; }
      .column { max-height: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>DevFlow Dashboard</h2>
    <div class="card" style="margin-bottom:12px">
      <b>Live Events</b>
      <div id="event-stats" class="muted" style="margin-top:6px">lifecycle:0 | step:0 | redline:0 | artifact:0</div>
      <div id="worker-stats" class="muted" style="margin-top:6px">workers: -</div>
    </div>

    <div class="card" style="margin-bottom:12px">
      <div class="row">
        <input id="project-path" placeholder="/Users/.../project" style="flex:1"/>
        <button onclick="scanSkills()">스캔</button>
        <button class="primary" onclick="saveConfig()">설정 저장</button>
      </div>
      <div class="muted" style="margin-top:8px">Pipeline: <span id="pipeline-text">-</span></div>
      <div class="muted" style="margin-top:6px">Preview before save: <span id="pipeline-preview">-</span></div>
      <div class="row" style="margin-top:8px"><b>Pipeline Order</b></div>
      <div id="pipeline-editor"></div>
      <div class="row" style="margin-top:8px">
        <input id="ticket-input" placeholder="RP-5316" style="flex:1"/>
        <button class="primary" onclick="addTicket()">티켓 추가</button>
      </div>
      <div class="row" style="margin-top:8px">
        <span class="muted">Board view:</span>
        <select id="view-mode" onchange="setViewMode(this.value)">
          <option value="skill">Skill</option>
          <option value="status">Status</option>
        </select>
        <span class="muted">WIP mode:</span>
        <select id="wip-mode" onchange="setWipMode(this.value)">
          <option value="warn">warning</option>
          <option value="enforce">enforce</option>
        </select>
      </div>
      <div id="skills" class="muted" style="margin-top:8px"></div>
    </div>

    <div id="timeline-panel" class="card" style="margin-bottom:12px; display:none">
      <div class="row" style="justify-content:space-between"><b>Ticket Timeline</b><button onclick="closeTimeline()">닫기</button></div>
      <div id="timeline-head" class="muted" style="margin-top:6px">-</div>
      <div class="row" style="margin-top:8px">
        <input id="timeline-query" placeholder="query" style="flex:1" />
        <input id="timeline-limit" type="number" min="1" max="500" value="50" style="width:86px" />
        <button onclick="loadTimeline()">검색</button>
      </div>
      <div id="timeline-list" class="timeline-list"></div>
    </div>

    <div id="board" class="grid"></div>
  </div>

<script>
let state = { pipeline: [], pipelineColumns: [], wipLimits: {}, wipPolicy: { mode:'warn' }, workerPool: { maxWorkers:3, queueDepth:0, roughEtaMin:0, slots:[] }, tickets: [] };
let availableSkills = [];
let editPipeline = [];
let openLogs = new Set();
let eventStats = { lifecycle: 0, step: 0, redline: 0, artifact: 0 };
let viewMode = 'skill';
let timelineTicketId = null;
let pendingWipLimits = {};
let pipelineDragIndex = null;

function statusColumnKey(t) { if (t.status === 'queued') return 'queued'; if (t.status === 'running') return 'running'; if (['review','awaiting_input','done'].includes(t.status)) return 'review'; return 'blocked'; }
function boardColumns() {
  if (viewMode === 'status') return [{ id:'queued', name:'Queue' },{ id:'running', name:'Running' },{ id:'review', name:'Review/Done' },{ id:'blocked', name:'Blocked/Halted' }];
  const skillColumns = (state.pipelineColumns?.length ? state.pipelineColumns : (state.pipeline||[]).map((skill, order) => ({ id:`skill:${skill}`, name:skill, skill, order }))).map(c => ({ id:c.id, name:c.name||c.skill, skill:c.skill }));
  return [...skillColumns, { id:'done', name:'Done' }];
}
function columnForTicket(t) { if (viewMode === 'status') return statusColumnKey(t); if (t.status === 'done' || t.isDone) return 'done'; if (t.currentSkill) return `skill:${t.currentSkill}`; return 'done'; }

function ticketBadges(t) {
  const badges = [`<span class='badge'>${esc(t.status)}</span>`];
  if (t.status === 'done' || t.isDone) badges.push(`<span class='badge done'>done</span>`);
  if (t.pendingAction?.metadata?.reason === 'manual_approval_required') badges.push(`<span class='badge danger'>manual approval required</span>`);
  if (t.pendingAction) badges.push(`<span class='badge warn'>pending-action</span>`);
  if (t.isStale) badges.push(`<span class='badge warn'>stale</span>`);
  if (t.blockedPriority) badges.push(`<span class='badge danger'>${esc(t.blockedPriority)}</span>`);
  return badges.join(' ');
}

function renderPendingActions(t) {
  if (!t.pendingAction) return '';
  const prominentApproval = t.pendingAction.metadata?.reason === 'manual_approval_required';
  const btns = (t.pendingAction.options||[]).map(o => {
    const cls = prominentApproval && ['approve','reject'].includes(o.id) ? (o.id === 'reject' ? 'danger' : 'primary') : '';
    return `<button class='${cls}' onclick="resolveAction('${t.id}','${o.id}')">${esc(o.label||o.id)}</button>`;
  }).join(' ');
  return `<div class='pending'><div class='pending-title'>Pending Action</div><div class='muted'>${esc(t.pendingAction.prompt)}</div><div class='actions'>${btns}</div></div>`;
}

function ticketHtml(t) {
  const actions = [`<button onclick="openTimeline('${t.id}')">timeline</button>`,`<button onclick="toggleLog('${t.id}')">log</button>`,`<button onclick="moveStep('${t.id}')">move step</button>`];
  if (t.status === 'running') actions.push(`<button onclick="stopTicket('${t.id}')">stop</button>`);
  if (['review','awaiting_input','blocked','halted'].includes(t.status)) actions.push(`<button class='primary' onclick="nextStep('${t.id}')">next</button>`);
  actions.push(`<button class='danger' onclick="deleteTicket('${t.id}')">delete</button>`);

  const artifacts = (t.artifacts||[]).slice(-3).map(a=>`<div class='artifact'>[${esc(a.type)}] ${esc(a.name)}</div>`).join('');
  const s=t.summary||{};
  const log = openLogs.has(t.id) ? `<div class='log'>${esc(t.log || '')}</div>` : '';
  const pendingPrompt = t.pendingAction?.prompt ? esc(t.pendingAction.prompt) : '-';

  return `<div class='ticket ${t.status === 'done' || t.isDone ? 'done' : ''} ${t.isStale ? 'stale' : ''} ${t.isPinnedBlocked ? 'pinned' : ''}'>
    <div class='ticket-top'>
      <div class='ticket-id'>${esc(t.jiraTicket)}</div>
      <div class='ticket-skill'>${esc(t.currentSkill || 'unknown')}</div>
    </div>
    <div class='ticket-main-meta'>
      <div>${ticketBadges(t)}</div>
      <div class='strong-line'>pending: <b>${pendingPrompt}</b></div>
      <div class='muted'>step ${t.currentStep + 1}/${Math.max(state.pipeline.length,1)} · slot ${t.workerSlot || '-'}</div>
    </div>

    <div class='actions'>${actions.join('')}</div>
    ${renderPendingActions(t)}

    <details class='meta'>
      <summary>상세 보기</summary>
      <div class='muted'>branch: ${esc(t.branchName || '-')}</div>
      <div class='muted'>latest commit: ${esc(s.latestCommit||'-')}</div>
      <div class='muted'>next action: ${esc(s.nextAction||'-')}</div>
      ${artifacts}
    </details>
    ${log}
  </div>`;
}

function render() {
  document.getElementById('pipeline-text').textContent = state.pipeline.length ? state.pipeline.join(' → ') : '-';
  document.getElementById('pipeline-preview').textContent = editPipeline.length ? editPipeline.join(' → ') : '-';
  document.getElementById('event-stats').textContent = `lifecycle:${eventStats.lifecycle} | step:${eventStats.step} | redline:${eventStats.redline} | artifact:${eventStats.artifact}`;
  const slots = (state.workerPool?.slots || []).map(s => `#${s.slot}:${s.jiraTicket || 'idle'}`).join(' | ');
  document.getElementById('worker-stats').textContent = `workers ${slots || '-'} | queue:${state.workerPool?.queueDepth ?? 0} | ETA:${state.workerPool?.roughEtaMin ?? 0}m`;
  document.getElementById('view-mode').value = viewMode;
  document.getElementById('wip-mode').value = state.wipPolicy?.mode === 'enforce' ? 'enforce' : 'warn';

  const columns = boardColumns();
  const groups = Object.fromEntries(columns.map(c => [c.id, []]));
  for (const t of state.tickets) { const key = columnForTicket(t); if (!groups[key]) groups[key] = []; groups[key].push(t); }

  const board = document.getElementById('board');
  board.style.gridTemplateColumns = `repeat(${Math.max(columns.length, 1)}, minmax(270px, 1fr))`;
  board.innerHTML = columns.map(c => {
    const tickets = groups[c.id] || [];
    const limit = pendingWipLimits?.[c.id] ?? pendingWipLimits?.[c.skill] ?? state.wipLimits?.[c.id] ?? state.wipLimits?.[c.skill] ?? '';
    const n = Number(limit);
    const hasLimit = Number.isInteger(n) && n >= 0;
    const over = hasLimit && tickets.length > n;
    const wipText = hasLimit ? `WIP ${tickets.length}/${n}${over ? ' ⚠' : ''}` : `${tickets.length}`;
    const wipEditor = c.skill ? `<input class='wip-input' type='number' min='0' value='${hasLimit ? n : ''}' placeholder='WIP' onchange="changeWip('${escAttr(c.skill)}', this.value)"/>` : '';
    const content = tickets.length ? tickets.map(ticketHtml).join('') : `<div class='column-empty'>📭 현재 티켓이 없습니다.<br/>새 티켓을 추가하거나 다음 단계로 이동해보세요.</div>`;
    return `<div class='card column'><div class='column-title'><b>${esc(c.name)}</b><span class='muted'>${wipText}</span>${wipEditor}</div>${content}</div>`;
  }).join('');

  renderPipelineEditor();
}

function renderPipelineEditor() {
  const html = editPipeline.map((s, i) => `<div class='pipeline-item' draggable='true' data-index='${i}' ondragstart='onPipelineDragStart(event, ${i})' ondragover='onPipelineDragOver(event, ${i})' ondragleave='onPipelineDragLeave(event)' ondrop='onPipelineDrop(event, ${i})' ondragend='onPipelineDragEnd(event)'><span>${i+1}. ${esc(s)}</span><button onclick='movePipeline(${i},-1)'>↑</button><button onclick='movePipeline(${i},1)'>↓</button><button onclick="removeFromPipeline('${escAttr(s)}')">x</button></div>`).join('');
  document.getElementById('pipeline-editor').innerHTML = (html ? `<div class='muted' style='margin-top:6px'>드래그앤드롭으로 순서 변경 가능</div>${html}` : `<div class='muted'>선택된 pipeline 없음</div>`);
  document.getElementById('skills').innerHTML = 'skills: ' + availableSkills.map(s => `<button onclick="toggleSkill('${escAttr(s)}')">${esc(s)}${editPipeline.includes(s)?'✓':''}</button>`).join(' ');
}

function movePipeline(index, delta) { const to=index+delta; if (to<0||to>=editPipeline.length) return; [editPipeline[index],editPipeline[to]]=[editPipeline[to],editPipeline[index]]; render(); }
function removeFromPipeline(skill) { editPipeline = editPipeline.filter(s => s !== skill); render(); }
function toggleSkill(skill) { if (editPipeline.includes(skill)) return removeFromPipeline(skill); editPipeline.push(skill); render(); }
function onPipelineDragStart(e, index) { pipelineDragIndex = index; e.currentTarget.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; }
function onPipelineDragOver(e, index) { e.preventDefault(); if (pipelineDragIndex === null || pipelineDragIndex === index) return; e.currentTarget.classList.add('drop-target'); e.dataTransfer.dropEffect = 'move'; }
function onPipelineDragLeave(e) { e.currentTarget.classList.remove('drop-target'); }
function onPipelineDrop(e, targetIndex) {
  e.preventDefault();
  e.currentTarget.classList.remove('drop-target');
  if (pipelineDragIndex === null || pipelineDragIndex === targetIndex) return;
  const moved = editPipeline[pipelineDragIndex];
  editPipeline.splice(pipelineDragIndex, 1);
  const insertIndex = pipelineDragIndex < targetIndex ? targetIndex - 1 : targetIndex;
  editPipeline.splice(insertIndex, 0, moved);
  pipelineDragIndex = null;
  render();
}
function onPipelineDragEnd(e) {
  pipelineDragIndex = null;
  document.querySelectorAll('.pipeline-item.drop-target').forEach(el => el.classList.remove('drop-target'));
  e.currentTarget.classList.remove('dragging');
}
function setViewMode(mode) { viewMode = mode === 'status' ? 'status' : 'skill'; render(); }
function setWipMode(mode) { state.wipPolicy = { mode: mode === 'enforce' ? 'enforce' : 'warn' }; saveConfig(); }
function changeWip(skill, value) { const n = Number(value); if (!pendingWipLimits) pendingWipLimits = {}; if (Number.isInteger(n) && n >= 0) pendingWipLimits[skill] = n; else delete pendingWipLimits[skill]; saveConfig(); }

async function loadConfig() {
  const res = await fetch('/api/config');
  const data = await res.json();
  document.getElementById('project-path').value = data.projectPath || '';
  availableSkills = data.availableSkills || [];
  editPipeline = [...(data.pipeline || [])];
  state.wipPolicy = data.wipPolicy || { mode:'warn' };
  pendingWipLimits = { ...(data.wipLimits || {}) };
  render();
}

async function saveConfig() {
  const projectPath = document.getElementById('project-path').value.trim();
  await fetch('/api/config', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ projectPath, pipeline: editPipeline, wipLimits: pendingWipLimits, wipPolicy: state.wipPolicy }) });
  refresh();
}

async function refresh() { const res = await fetch('/api/tickets'); state = await res.json(); pendingWipLimits = { ...(state.wipLimits || pendingWipLimits || {}) }; render(); }
async function scanSkills() { const p = document.getElementById('project-path').value.trim(); const res = await fetch(`/api/skills?projectPath=${encodeURIComponent(p)}`); const data = await res.json(); availableSkills = data.skills || []; render(); }
async function addTicket() { const jiraTicket = document.getElementById('ticket-input').value.trim(); if (!jiraTicket) return; await fetch('/api/tickets', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ jiraTicket }) }); document.getElementById('ticket-input').value = ''; refresh(); }
async function resolveAction(id, actionId) { await fetch(`/api/tickets/${id}/actions/resolve`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ actionId })}); refresh(); }
async function nextStep(id) { await fetch(`/api/tickets/${id}/next`, { method:'POST' }); refresh(); }
async function stopTicket(id) { await fetch(`/api/tickets/${id}/stop`, { method:'POST' }); refresh(); }
async function deleteTicket(id) { await fetch(`/api/tickets/${id}`, { method:'DELETE' }); refresh(); }
async function moveStep(id) {
  const t = state.tickets.find(x => x.id === id); if (!t) return;
  const choices = state.pipeline.map((s, idx) => `${idx}:${s}`).join(', ');
  const stepRaw = prompt(`이동할 step index를 입력하세요 (${choices})`, String(t.currentStep));
  if (stepRaw == null) return;
  const reason = prompt('이동 사유(reason)를 입력하세요 (필수)');
  if (!reason || !reason.trim()) return alert('reason은 필수입니다.');
  const res = await fetch(`/api/tickets/${id}/move-step`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ stepIndex: Number(stepRaw), reason: reason.trim() }) });
  const data = await res.json();
  if (!res.ok) alert(data.error || '이동 실패');
  refresh();
}

async function openTimeline(ticketId) { timelineTicketId = ticketId; document.getElementById('timeline-panel').style.display = 'block'; document.getElementById('timeline-head').textContent = `ticket #${ticketId}`; await loadTimeline(); }
function closeTimeline() { document.getElementById('timeline-panel').style.display = 'none'; timelineTicketId = null; }
async function loadTimeline() {
  if (!timelineTicketId) return;
  const q = document.getElementById('timeline-query').value.trim();
  const limit = Number(document.getElementById('timeline-limit').value || 50);
  const res = await fetch(`/api/timeline?ticketId=${encodeURIComponent(timelineTicketId)}&q=${encodeURIComponent(q)}&limit=${encodeURIComponent(limit)}`);
  const data = await res.json();
  const events = data.events || [];
  document.getElementById('timeline-list').innerHTML = events.length ? events.map(e => `<div class='timeline-item'><div><b>${esc(e.type || 'event')}</b> ${esc(e.status || '')}</div><div class='muted'>${new Date(e.timestamp).toLocaleString()} | step:${e.currentStep ?? '-'} | ${esc(JSON.stringify(e).slice(0, 240))}</div></div>`).join('') : `<div class='muted'>이벤트 없음</div>`;
}

function toggleLog(id) { if (openLogs.has(id)) openLogs.delete(id); else openLogs.add(id); render(); }
function esc(s){ return String(s||'').replace(/[&<>"']/g, m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m])); }
function escAttr(s){ return String(s||'').replace(/'/g, "\\'"); }

function connectSSE() {
  const es = new EventSource('/api/events');
  es.addEventListener('ticket', (e) => { const incoming = JSON.parse(e.data); const idx = state.tickets.findIndex(t => t.id === incoming.id); if (idx >= 0) state.tickets[idx] = incoming; else state.tickets.unshift(incoming); render(); });
  es.addEventListener('ticket_deleted', (e) => { const { id } = JSON.parse(e.data); state.tickets = state.tickets.filter(t => t.id !== id); render(); });
  es.addEventListener('task_lifecycle', () => { eventStats.lifecycle += 1; render(); });
  es.addEventListener('step_event', () => { eventStats.step += 1; render(); });
  es.addEventListener('redline_event', () => { eventStats.redline += 1; render(); });
  es.addEventListener('artifact_added', () => { eventStats.artifact += 1; render(); });
  es.onerror = () => { setTimeout(connectSSE, 2000); };
}

loadConfig();
refresh();
connectSSE();
setInterval(refresh, 8000);
</script>
</body>
</html>
