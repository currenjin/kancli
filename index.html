<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevFlow</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #f6f8fc;
      --panel: #ffffff;
      --surface: #ffffff;
      --line: #e2e8f0;
      --line-soft: #edf2f7;
      --text: #0f172a;
      --muted: #64748b;
      --brand: #2563eb;
      --brand-strong: #1d4ed8;
      --danger: #dc2626;
      --danger-strong: #b91c1c;
      --input-bg: #ffffff;
      --ticket-skill-bg: #eff6ff;
      --ticket-skill-text: #1d4ed8;
      --badge-bg: #e2e8f0;
      --badge-text: #334155;
      --badge-done-bg: #dcfce7;
      --badge-done-text: #166534;
      --badge-warn-bg: #fef3c7;
      --badge-warn-text: #92400e;
      --badge-danger-bg: #fee2e2;
      --badge-danger-text: #991b1b;
      --pending-bg: #fcfaff;
      --pending-border: #e9d5ff;
      --pending-title: #6b21a8;
      --log-bg: #0f172a;
      --log-text: #e2e8f0;
      --empty-bg: #fafcff;
      --empty-border: #d0d9e6;
      --ticket-done-border: #bbf7d0;
      --ticket-done-bg: #f7fef9;
      --ticket-stale-border: #facc15;
      --ticket-stale-shadow: #fde68a;
      --ticket-pinned: #ef4444;
    }
    :root[data-theme='dark'] {
      --bg: #0b1220;
      --panel: #111a2c;
      --surface: #152238;
      --line: #334155;
      --line-soft: #243247;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --brand: #3b82f6;
      --brand-strong: #2563eb;
      --danger: #ef4444;
      --danger-strong: #dc2626;
      --input-bg: #0f172a;
      --ticket-skill-bg: #1e3a5f;
      --ticket-skill-text: #bfdbfe;
      --badge-bg: #334155;
      --badge-text: #e2e8f0;
      --badge-done-bg: #14532d;
      --badge-done-text: #bbf7d0;
      --badge-warn-bg: #78350f;
      --badge-warn-text: #fde68a;
      --badge-danger-bg: #7f1d1d;
      --badge-danger-text: #fecaca;
      --pending-bg: #29183f;
      --pending-border: #6b21a8;
      --pending-title: #e9d5ff;
      --log-bg: #020617;
      --log-text: #cbd5e1;
      --empty-bg: #101a2b;
      --empty-border: #334155;
      --ticket-done-border: #166534;
      --ticket-done-bg: #052e1b;
      --ticket-stale-border: #ca8a04;
      --ticket-stale-shadow: #713f12;
      --ticket-pinned: #f87171;
    }
    body { font-family: Inter, system-ui, -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text); }
    .container { max-width: 1560px; margin: 0 auto; padding: 18px; }
    h2 { margin: 4px 0 14px; font-size: 22px; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .section { margin-bottom: 12px; }
    .section-title { font-size: 13px; font-weight: 700; color: var(--text); }
    .stack-sm { margin-top: 6px; }
    .stack-md { margin-top: 8px; }
    .grow { flex: 1; }
    .input-xs { width: 86px; }
    .row-between { justify-content: space-between; }

    input, button, select {
      min-height: 34px;
      padding: 7px 11px;
      border-radius: 9px;
      border: 1px solid var(--line);
      font-size: 13px;
      background: var(--input-bg);
      color: var(--text);
    }
    button { cursor: pointer; transition: .14s ease; font-weight: 600; color: var(--text); }
    button:hover { border-color: var(--muted); background: var(--surface); }
    button:active { transform: translateY(1px); }
    .primary { background: var(--brand); color: #fff; border-color: var(--brand-strong); }
    .primary:hover { background: var(--brand-strong); border-color: #1e40af; }
    .secondary { background: var(--surface); color: var(--text); border-color: var(--line); }
    .danger { background: var(--danger); color: #fff; border-color: var(--danger-strong); }
    .danger:hover { background: var(--danger-strong); border-color: #991b1b; }

    .card { background: var(--panel); border: 1px solid var(--line-soft); border-radius: 14px; padding: 14px; box-shadow: 0 1px 1px rgba(15, 23, 42, 0.03); }
    .grid { display: grid; gap: 12px; margin-top: 12px; overflow-x: auto; align-items: start; padding-bottom: 8px; }

    .column { min-height: 200px; max-height: calc(100vh - 180px); overflow: auto; padding-bottom: 8px; }
    .column.collapsed { min-height: 96px; max-height: 160px; overflow: hidden; }
    .column-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      position: sticky;
      top: -1px;
      z-index: 2;
      background: var(--panel);
      padding-bottom: 8px;
      border-bottom: 1px solid var(--line-soft);
      margin-bottom: 2px;
    }
    .column-actions { display:flex; align-items:center; gap:6px; }

    .ticket { margin-top: 9px; border: 1px solid var(--line-soft); border-radius: 12px; padding: 11px; background: var(--surface); }
    .ticket.done { border-color: var(--ticket-done-border); background: var(--ticket-done-bg); }
    .ticket.stale { border-color: var(--ticket-stale-border); box-shadow: 0 0 0 1px var(--ticket-stale-shadow) inset; }
    .ticket.pinned { border-left: 3px solid var(--ticket-pinned); }
    .ticket-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .ticket-id { font-weight: 800; font-size: 15px; letter-spacing: .2px; line-height: 1.2; }
    .ticket-skill { font-size: 11px; color: var(--ticket-skill-text); font-weight: 700; background: var(--ticket-skill-bg); border-radius: 999px; padding: 3px 8px; letter-spacing: .2px; }
    .ticket-main-meta { margin-top: 7px; display: grid; gap: 5px; }

    .muted { color: var(--muted); font-size: 12px; }
    .strong-line { font-size: 12px; color: var(--muted); }
    .strong-line b { color: var(--text); font-weight: 700; }
    .badge { display:inline-flex; align-items:center; font-size: 10px; letter-spacing: .2px; border-radius: 999px; padding: 3px 8px; background: var(--badge-bg); color: var(--badge-text); font-weight: 700; margin-right: 4px; }
    .badge.done { background: var(--badge-done-bg); color: var(--badge-done-text); }
    .badge.warn { background: var(--badge-warn-bg); color: var(--badge-warn-text); }
    .badge.danger { background: var(--badge-danger-bg); color: var(--badge-danger-text); }

    .actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
    .actions .danger { margin-left: auto; }
    .pending { background: var(--pending-bg); border: 1px solid var(--pending-border); border-radius: 9px; padding: 9px; margin-top: 9px; }
    .pending-title { font-size: 11px; text-transform: uppercase; letter-spacing: .45px; font-weight: 700; color: var(--pending-title); margin-bottom: 5px; }
    .artifact { font: 11px ui-monospace, SFMono-Regular, Menlo, monospace; margin-top: 5px; color: var(--muted); }
    .log { margin-top: 8px; max-height: 180px; overflow: auto; background: var(--log-bg); color: var(--log-text); padding: 8px; border-radius: 6px; font: 11px/1.5 monospace; white-space: pre-wrap; border: 1px solid var(--line); }

    details.meta { margin-top: 8px; border-top: 1px dashed var(--line); padding-top: 7px; }
    details.meta > summary { list-style: none; cursor: pointer; color: var(--muted); font-size: 12px; font-weight: 600; }
    details.meta > summary::-webkit-details-marker { display:none; }

    .column-empty { margin-top: 12px; color: var(--muted); font-size: 12px; border: 1px dashed var(--empty-border); border-radius: 10px; padding: 14px; background: var(--empty-bg); text-align: center; }

    .timeline-list { max-height: 220px; overflow:auto; margin-top:8px; border:1px solid var(--line); border-radius:8px; padding:8px; background: var(--surface); }
    .timeline-item { padding:6px 0; border-bottom:1px dashed var(--line); font-size:12px; }
    .timeline-item:last-child { border-bottom:none; }
    .wip-input { width:68px; font-size:12px; padding:4px 6px; min-height: 30px; }

    .pipeline-help { margin-top: 6px; }
    .pipeline-item { display:flex; align-items:center; gap:8px; padding:7px 9px; border:1px solid var(--line); border-radius:9px; margin-top:6px; background:#fff; }
    .pipeline-handle { color:#94a3b8; font-size: 13px; }
    .pipeline-item[draggable='true'] { cursor: grab; }
    .pipeline-item.dragging { opacity: .55; }
    .pipeline-item.drop-target { border-color: var(--brand); box-shadow:0 0 0 2px rgba(37,99,235,.12) inset; }

    body[data-density='compact'] .grid { gap: 8px; }
    body[data-density='compact'] .card { padding: 10px; border-radius: 11px; }
    body[data-density='compact'] .ticket { margin-top: 7px; padding: 9px; border-radius: 10px; }
    body[data-density='compact'] .ticket-main-meta { margin-top: 5px; gap: 3px; }
    body[data-density='compact'] .actions { margin-top: 8px; gap: 5px; }
    body[data-density='compact'] .column { min-height: 150px; }

    @media (max-width: 1200px) {
      .container { padding: 14px; }
      .grid { gap: 10px; }
      .column { max-height: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>DevFlow Dashboard</h2>
    <div class="card section">
      <b>Live Events</b>
      <div id="event-stats" class="muted stack-sm">lifecycle:0 | step:0 | redline:0 | artifact:0</div>
      <div id="worker-stats" class="muted stack-sm">workers: -</div>
    </div>

    <div class="card section">
      <div class="row row-between">
        <b>이슈 추가</b>
        <span class="muted">칸반 투입</span>
      </div>
      <div class="row stack-md">
        <input id="ticket-input" class="grow" placeholder="RP-5316"/>
        <button class="primary" onclick="addTicket()">티켓 추가</button>
      </div>
    </div>

    <div class="card section">
      <div class="row row-between">
        <b>설정</b>
        <button id="settings-toggle" class="secondary" onclick="toggleSettingsPanel()">닫기</button>
      </div>
      <div id="settings-panel" class="stack-md">
        <div class="row">
          <input id="project-path" class="grow" placeholder="/Users/.../project"/>
          <button class="secondary" onclick="scanSkills()">스캔</button>
          <button class="primary" onclick="saveConfig()">설정 저장</button>
        </div>
        <div class="muted stack-md">Pipeline: <span id="pipeline-text">-</span></div>
        <div class="muted stack-sm">Preview before save: <span id="pipeline-preview">-</span></div>
        <div class="row stack-md"><span class="section-title">Pipeline Order</span></div>
        <div id="pipeline-editor"></div>
        <div class="row stack-md">
          <span class="muted">Theme:</span>
          <select id="theme-mode" onchange="setThemeMode(this.value)">
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
          <span class="muted">Density:</span>
          <select id="density-mode" onchange="setDensityMode(this.value)">
            <option value="comfy">Comfy</option>
            <option value="compact">Compact</option>
          </select>
          <span class="muted">Board view:</span>
          <select id="view-mode" onchange="setViewMode(this.value)">
            <option value="skill">Skill</option>
            <option value="status">Status</option>
          </select>
          <span class="muted">WIP mode:</span>
          <select id="wip-mode" onchange="setWipMode(this.value)">
            <option value="warn">warning</option>
            <option value="enforce">enforce</option>
          </select>
        </div>
        <div id="skills" class="muted stack-md"></div>
      </div>
    </div>

    <div id="timeline-panel" class="card section" style="display:none">
      <div class="row row-between"><b>Ticket Timeline</b><button class="secondary" onclick="closeTimeline()">닫기</button></div>
      <div id="timeline-head" class="muted stack-sm">-</div>
      <div class="row stack-md">
        <input id="timeline-query" class="grow" placeholder="query" />
        <input id="timeline-limit" class="input-xs" type="number" min="1" max="500" value="50" />
        <button class="secondary" onclick="loadTimeline()">검색</button>
      </div>
      <div id="timeline-list" class="timeline-list"></div>
    </div>

    <div id="board" class="grid"></div>
  </div>

<script>
let state = { pipeline: [], pipelineColumns: [], wipLimits: {}, wipPolicy: { mode:'warn' }, workerPool: { maxWorkers:3, queueDepth:0, roughEtaMin:0, slots:[] }, tickets: [] };
let availableSkills = [];
let editPipeline = [];
let openLogs = new Set();
let logScrollState = {};
let eventStats = { lifecycle: 0, step: 0, redline: 0, artifact: 0 };
let viewMode = 'skill';
let themeMode = 'light';
let densityMode = 'comfy';
let collapsedColumns = new Set();
let timelineTicketId = null;
let pendingWipLimits = {};
let pipelineDragIndex = null;
let settingsOpen = true;

const PREF_KEYS = {
  theme: 'devflow:theme',
  density: 'devflow:density',
  collapsed: 'devflow:collapsed-columns',
  settingsOpen: 'devflow:settings-open'
};

function statusColumnKey(t) { if (t.status === 'queued') return 'queued'; if (t.status === 'running') return 'running'; if (['review','awaiting_input','done'].includes(t.status)) return 'review'; return 'blocked'; }
function boardColumns() {
  if (viewMode === 'status') return [{ id:'queued', name:'Queue' },{ id:'running', name:'Running' },{ id:'review', name:'Review/Done' },{ id:'blocked', name:'Blocked/Halted' }];
  const skillColumns = (state.pipelineColumns?.length ? state.pipelineColumns : (state.pipeline||[]).map((skill, order) => ({ id:`skill:${skill}`, name:skill, skill, order }))).map(c => ({ id:c.id, name:c.name||c.skill, skill:c.skill }));
  return [...skillColumns, { id:'done', name:'Done' }];
}
function columnForTicket(t) { if (viewMode === 'status') return statusColumnKey(t); if (t.status === 'done' || t.isDone) return 'done'; if (t.currentSkill) return `skill:${t.currentSkill}`; return 'done'; }

function loadUiPrefs() {
  themeMode = localStorage.getItem(PREF_KEYS.theme) === 'dark' ? 'dark' : 'light';
  densityMode = localStorage.getItem(PREF_KEYS.density) === 'compact' ? 'compact' : 'comfy';
  settingsOpen = localStorage.getItem(PREF_KEYS.settingsOpen) !== '0';
  try {
    const raw = localStorage.getItem(PREF_KEYS.collapsed);
    const parsed = raw ? JSON.parse(raw) : [];
    collapsedColumns = new Set(Array.isArray(parsed) ? parsed : []);
  } catch {
    collapsedColumns = new Set();
  }
}

function applyUiPrefs() {
  document.documentElement.setAttribute('data-theme', themeMode);
  document.body.setAttribute('data-density', densityMode);
}

function persistCollapsedColumns() {
  localStorage.setItem(PREF_KEYS.collapsed, JSON.stringify([...collapsedColumns]));
}

function ticketBadges(t) {
  const badges = [`<span class='badge'>${esc(t.status)}</span>`];
  if (t.status === 'done' || t.isDone) badges.push(`<span class='badge done'>done</span>`);
  if (t.pendingAction?.metadata?.reason === 'manual_approval_required') badges.push(`<span class='badge danger'>manual approval required</span>`);
  if (t.pendingAction) badges.push(`<span class='badge warn'>pending-action</span>`);
  if (t.isStale) badges.push(`<span class='badge warn'>stale</span>`);
  if (t.blockedPriority) badges.push(`<span class='badge danger'>${esc(t.blockedPriority)}</span>`);
  return badges.join(' ');
}

function renderPendingActions(t) {
  if (!t.pendingAction) return '';
  const prominentApproval = t.pendingAction.metadata?.reason === 'manual_approval_required';
  const btns = (t.pendingAction.options||[]).map(o => {
    const cls = prominentApproval && ['approve','reject'].includes(o.id) ? (o.id === 'reject' ? 'danger' : 'primary') : '';
    return `<button class='${cls}' onclick="resolveAction('${t.id}','${o.id}')">${esc(o.label||o.id)}</button>`;
  }).join(' ');
  return `<div class='pending'><div class='pending-title'>Pending Action</div><div class='muted'>${esc(t.pendingAction.prompt)}</div><div class='actions'>${btns}</div></div>`;
}

function ticketHtml(t) {
  const actions = [`<button class='secondary' onclick="openTimeline('${t.id}')">timeline</button>`,`<button class='secondary' onclick="toggleLog('${t.id}')">log</button>`,`<button class='secondary' onclick="moveStep('${t.id}')">move step</button>`];
  if (t.status === 'running') actions.push(`<button class='secondary' onclick="stopTicket('${t.id}')">stop</button>`);
  if (['review','awaiting_input','blocked','halted'].includes(t.status)) actions.push(`<button class='primary' onclick="nextStep('${t.id}')">next</button>`);
  actions.push(`<button class='danger' onclick="deleteTicket('${t.id}')">delete</button>`);

  const artifacts = (t.artifacts||[]).slice(-3).map(a=>`<div class='artifact'>[${esc(a.type)}] ${esc(a.name)}</div>`).join('');
  const s=t.summary||{};
  const log = openLogs.has(t.id) ? `<div id='log-${t.id}' class='log'>${esc(t.log || '')}</div>` : '';
  const pendingPrompt = t.pendingAction?.prompt ? esc(t.pendingAction.prompt) : '-';

  return `<div class='ticket ${t.status === 'done' || t.isDone ? 'done' : ''} ${t.isStale ? 'stale' : ''} ${t.isPinnedBlocked ? 'pinned' : ''}'>
    <div class='ticket-top'>
      <div class='ticket-id'>${esc(t.jiraTicket)}</div>
      <div class='ticket-skill'>${esc(t.currentSkill || 'unknown')}</div>
    </div>
    <div class='ticket-main-meta'>
      <div>${ticketBadges(t)}</div>
      <div class='strong-line'>pending: <b>${pendingPrompt}</b></div>
      <div class='muted'>step ${t.currentStep + 1}/${Math.max(state.pipeline.length,1)} · slot ${t.workerSlot || '-'}</div>
    </div>

    <div class='actions'>${actions.join('')}</div>
    ${renderPendingActions(t)}

    <details class='meta'>
      <summary>상세 보기</summary>
      <div class='muted'>branch: ${esc(t.branchName || '-')}</div>
      <div class='muted'>latest commit: ${esc(s.latestCommit||'-')}</div>
      <div class='muted'>next action: ${esc(s.nextAction||'-')}</div>
      ${artifacts}
    </details>
    ${log}
  </div>`;
}

function captureLogScrollState() {
  for (const id of openLogs) {
    const el = document.getElementById(`log-${id}`);
    if (!el) continue;
    const nearBottom = (el.scrollHeight - el.scrollTop - el.clientHeight) < 24;
    logScrollState[id] = { top: el.scrollTop, nearBottom };
  }
}

function restoreLogScrollState() {
  for (const id of openLogs) {
    const el = document.getElementById(`log-${id}`);
    if (!el) continue;
    const saved = logScrollState[id];
    if (!saved) {
      el.scrollTop = el.scrollHeight;
      continue;
    }
    if (saved.nearBottom) el.scrollTop = el.scrollHeight;
    else el.scrollTop = saved.top;
  }
}

function render() {
  captureLogScrollState();
  document.getElementById('pipeline-text').textContent = state.pipeline.length ? state.pipeline.join(' → ') : '-';
  document.getElementById('pipeline-preview').textContent = editPipeline.length ? editPipeline.join(' → ') : '-';
  document.getElementById('event-stats').textContent = `lifecycle:${eventStats.lifecycle} | step:${eventStats.step} | redline:${eventStats.redline} | artifact:${eventStats.artifact}`;
  const slots = (state.workerPool?.slots || []).map(s => `#${s.slot}:${s.jiraTicket || 'idle'}`).join(' | ');
  document.getElementById('worker-stats').textContent = `workers ${slots || '-'} | queue:${state.workerPool?.queueDepth ?? 0} | ETA:${state.workerPool?.roughEtaMin ?? 0}m`;
  document.getElementById('theme-mode').value = themeMode;
  document.getElementById('density-mode').value = densityMode;
  document.getElementById('view-mode').value = viewMode;
  document.getElementById('wip-mode').value = state.wipPolicy?.mode === 'enforce' ? 'enforce' : 'warn';
  document.getElementById('settings-panel').style.display = settingsOpen ? 'block' : 'none';
  document.getElementById('settings-toggle').textContent = settingsOpen ? '닫기' : '열기';

  const columns = boardColumns();
  const validColumnIds = new Set(columns.map(c => c.id));
  collapsedColumns = new Set([...collapsedColumns].filter(id => validColumnIds.has(id)));
  const groups = Object.fromEntries(columns.map(c => [c.id, []]));
  for (const t of state.tickets) { const key = columnForTicket(t); if (!groups[key]) groups[key] = []; groups[key].push(t); }

  const board = document.getElementById('board');
  board.style.gridTemplateColumns = columns.map(c => collapsedColumns.has(c.id) ? 'minmax(170px, 170px)' : 'minmax(270px, 1fr)').join(' ');
  board.innerHTML = columns.map(c => {
    const tickets = groups[c.id] || [];
    const isCollapsed = collapsedColumns.has(c.id);
    const limit = pendingWipLimits?.[c.id] ?? pendingWipLimits?.[c.skill] ?? state.wipLimits?.[c.id] ?? state.wipLimits?.[c.skill] ?? '';
    const n = Number(limit);
    const hasLimit = Number.isInteger(n) && n >= 0;
    const over = hasLimit && tickets.length > n;
    const wipText = hasLimit ? `WIP ${tickets.length}/${n}${over ? ' ⚠' : ''}` : `${tickets.length}`;
    const wipEditor = c.skill && !isCollapsed ? `<input class='wip-input' type='number' min='0' value='${hasLimit ? n : ''}' placeholder='WIP' onchange="changeWip('${escAttr(c.skill)}', this.value)"/>` : '';
    const collapseBtn = `<button class='secondary' onclick="toggleColumnCollapse('${escAttr(c.id)}')">${isCollapsed ? '펼치기' : '접기'}</button>`;
    const content = isCollapsed
      ? `<div class='column-empty'>티켓 ${tickets.length}개</div>`
      : (tickets.length ? tickets.map(ticketHtml).join('') : `<div class='column-empty'>📭 현재 티켓이 없습니다.<br/>새 티켓을 추가하거나 다음 단계로 이동해보세요.</div>`);
    return `<div class='card column ${isCollapsed ? 'collapsed' : ''}'><div class='column-title'><b>${esc(c.name)}</b><div class='column-actions'><span class='muted'>${wipText}</span>${wipEditor}${collapseBtn}</div></div>${content}</div>`;
  }).join('');

  renderPipelineEditor();
  restoreLogScrollState();
}

function renderPipelineEditor() {
  const html = editPipeline.map((s, i) => `<div class='pipeline-item' draggable='true' data-index='${i}' ondragstart='onPipelineDragStart(event, ${i})' ondragover='onPipelineDragOver(event, ${i})' ondragleave='onPipelineDragLeave(event)' ondrop='onPipelineDrop(event, ${i})' ondragend='onPipelineDragEnd(event)'><span class='pipeline-handle'>⠿</span><span>${i+1}. ${esc(s)}</span></div>`).join('');
  document.getElementById('pipeline-editor').innerHTML = (html ? `<div class='muted pipeline-help'>드래그 핸들로 순서 변경</div>${html}` : `<div class='muted'>선택된 pipeline 없음</div>`);
  document.getElementById('skills').innerHTML = 'skills: ' + availableSkills.map(s => `<button class='secondary' onclick="toggleSkill('${escAttr(s)}')">${esc(s)}${editPipeline.includes(s)?' ✓':''}</button>`).join(' ');
}

function movePipeline(index, delta) { const to=index+delta; if (to<0||to>=editPipeline.length) return; [editPipeline[index],editPipeline[to]]=[editPipeline[to],editPipeline[index]]; render(); }
function removeFromPipeline(skill) { editPipeline = editPipeline.filter(s => s !== skill); render(); }
function toggleSkill(skill) { if (editPipeline.includes(skill)) return removeFromPipeline(skill); editPipeline.push(skill); render(); }
function onPipelineDragStart(e, index) { pipelineDragIndex = index; e.currentTarget.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; }
function onPipelineDragOver(e, index) { e.preventDefault(); if (pipelineDragIndex === null || pipelineDragIndex === index) return; e.currentTarget.classList.add('drop-target'); e.dataTransfer.dropEffect = 'move'; }
function onPipelineDragLeave(e) { e.currentTarget.classList.remove('drop-target'); }
function onPipelineDrop(e, targetIndex) {
  e.preventDefault();
  e.currentTarget.classList.remove('drop-target');
  if (pipelineDragIndex === null || pipelineDragIndex === targetIndex) return;
  const moved = editPipeline[pipelineDragIndex];
  editPipeline.splice(pipelineDragIndex, 1);
  const insertIndex = pipelineDragIndex < targetIndex ? targetIndex - 1 : targetIndex;
  editPipeline.splice(insertIndex, 0, moved);
  pipelineDragIndex = null;
  render();
}
function onPipelineDragEnd(e) {
  pipelineDragIndex = null;
  document.querySelectorAll('.pipeline-item.drop-target').forEach(el => el.classList.remove('drop-target'));
  e.currentTarget.classList.remove('dragging');
}
function setThemeMode(mode) {
  themeMode = mode === 'dark' ? 'dark' : 'light';
  localStorage.setItem(PREF_KEYS.theme, themeMode);
  applyUiPrefs();
  render();
}
function setDensityMode(mode) {
  densityMode = mode === 'compact' ? 'compact' : 'comfy';
  localStorage.setItem(PREF_KEYS.density, densityMode);
  applyUiPrefs();
  render();
}
function toggleColumnCollapse(columnId) {
  if (collapsedColumns.has(columnId)) collapsedColumns.delete(columnId);
  else collapsedColumns.add(columnId);
  persistCollapsedColumns();
  render();
}
function toggleSettingsPanel() {
  settingsOpen = !settingsOpen;
  localStorage.setItem(PREF_KEYS.settingsOpen, settingsOpen ? '1' : '0');
  render();
}
function setViewMode(mode) { viewMode = mode === 'status' ? 'status' : 'skill'; render(); }
function setWipMode(mode) { state.wipPolicy = { mode: mode === 'enforce' ? 'enforce' : 'warn' }; saveConfig(); }
function changeWip(skill, value) { const n = Number(value); if (!pendingWipLimits) pendingWipLimits = {}; if (Number.isInteger(n) && n >= 0) pendingWipLimits[skill] = n; else delete pendingWipLimits[skill]; saveConfig(); }

async function loadConfig() {
  const res = await fetch('/api/config');
  const data = await res.json();
  document.getElementById('project-path').value = data.projectPath || '';
  availableSkills = data.availableSkills || [];
  editPipeline = [...(data.pipeline || [])];
  state.wipPolicy = data.wipPolicy || { mode:'warn' };
  pendingWipLimits = { ...(data.wipLimits || {}) };
  render();
}

async function saveConfig() {
  const projectPath = document.getElementById('project-path').value.trim();
  await fetch('/api/config', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ projectPath, pipeline: editPipeline, wipLimits: pendingWipLimits, wipPolicy: state.wipPolicy }) });
  refresh();
}

async function refresh() { const res = await fetch('/api/tickets'); state = await res.json(); pendingWipLimits = { ...(state.wipLimits || pendingWipLimits || {}) }; render(); }
async function scanSkills() { const p = document.getElementById('project-path').value.trim(); const res = await fetch(`/api/skills?projectPath=${encodeURIComponent(p)}`); const data = await res.json(); availableSkills = data.skills || []; render(); }
async function addTicket() { const jiraTicket = document.getElementById('ticket-input').value.trim(); if (!jiraTicket) return; await fetch('/api/tickets', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ jiraTicket }) }); document.getElementById('ticket-input').value = ''; refresh(); }
async function resolveAction(id, actionId) { await fetch(`/api/tickets/${id}/actions/resolve`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ actionId })}); refresh(); }
async function nextStep(id) { await fetch(`/api/tickets/${id}/next`, { method:'POST' }); refresh(); }
async function stopTicket(id) { await fetch(`/api/tickets/${id}/stop`, { method:'POST' }); refresh(); }
async function deleteTicket(id) { await fetch(`/api/tickets/${id}`, { method:'DELETE' }); refresh(); }
async function moveStep(id) {
  const t = state.tickets.find(x => x.id === id); if (!t) return;
  const choices = state.pipeline.map((s, idx) => `${idx}:${s}`).join(', ');
  const stepRaw = prompt(`이동할 step index를 입력하세요 (${choices})`, String(t.currentStep));
  if (stepRaw == null) return;
  const reason = prompt('이동 사유(reason)를 입력하세요 (필수)');
  if (!reason || !reason.trim()) return alert('reason은 필수입니다.');
  const res = await fetch(`/api/tickets/${id}/move-step`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ stepIndex: Number(stepRaw), reason: reason.trim() }) });
  const data = await res.json();
  if (!res.ok) alert(data.error || '이동 실패');
  refresh();
}

async function openTimeline(ticketId) { timelineTicketId = ticketId; document.getElementById('timeline-panel').style.display = 'block'; document.getElementById('timeline-head').textContent = `ticket #${ticketId}`; await loadTimeline(); }
function closeTimeline() { document.getElementById('timeline-panel').style.display = 'none'; timelineTicketId = null; }
async function loadTimeline() {
  if (!timelineTicketId) return;
  const q = document.getElementById('timeline-query').value.trim();
  const limit = Number(document.getElementById('timeline-limit').value || 50);
  const res = await fetch(`/api/timeline?ticketId=${encodeURIComponent(timelineTicketId)}&q=${encodeURIComponent(q)}&limit=${encodeURIComponent(limit)}`);
  const data = await res.json();
  const events = data.events || [];
  document.getElementById('timeline-list').innerHTML = events.length ? events.map(e => `<div class='timeline-item'><div><b>${esc(e.type || 'event')}</b> ${esc(e.status || '')}</div><div class='muted'>${new Date(e.timestamp).toLocaleString()} | step:${e.currentStep ?? '-'} | ${esc(JSON.stringify(e).slice(0, 240))}</div></div>`).join('') : `<div class='muted'>이벤트 없음</div>`;
}

function toggleLog(id) { if (openLogs.has(id)) openLogs.delete(id); else openLogs.add(id); render(); }
function esc(s){ return String(s||'').replace(/[&<>"']/g, m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m])); }
function escAttr(s){ return String(s||'').replace(/'/g, "\\'"); }

function connectSSE() {
  const es = new EventSource('/api/events');
  es.addEventListener('ticket', (e) => { const incoming = JSON.parse(e.data); const idx = state.tickets.findIndex(t => t.id === incoming.id); if (idx >= 0) state.tickets[idx] = incoming; else state.tickets.unshift(incoming); render(); });
  es.addEventListener('ticket_deleted', (e) => { const { id } = JSON.parse(e.data); state.tickets = state.tickets.filter(t => t.id !== id); render(); });
  es.addEventListener('task_lifecycle', () => { eventStats.lifecycle += 1; render(); });
  es.addEventListener('step_event', () => { eventStats.step += 1; render(); });
  es.addEventListener('redline_event', () => { eventStats.redline += 1; render(); });
  es.addEventListener('artifact_added', () => { eventStats.artifact += 1; render(); });
  es.onerror = () => { setTimeout(connectSSE, 2000); };
}

loadUiPrefs();
applyUiPrefs();
loadConfig();
refresh();
connectSSE();
setInterval(refresh, 8000);
</script>
</body>
</html>
