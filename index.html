<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevFlow</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 0; background: #f8fafc; color: #1f2937; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .row { display: flex; gap: 8px; }
    input, button { padding: 8px 10px; border-radius: 8px; border: 1px solid #cbd5e1; }
    button { cursor: pointer; background: white; }
    .primary { background: #2563eb; color: white; border-color: #2563eb; }
    .card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 12px; }
    .ticket { margin-top: 8px; border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px; }
    .muted { color: #64748b; font-size: 12px; }
    .badge { font-size: 11px; border-radius: 999px; padding: 2px 8px; background: #e2e8f0; }
    .actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .log { margin-top: 8px; max-height: 180px; overflow: auto; background: #0f172a; color: #e2e8f0; padding: 8px; border-radius: 6px; font: 11px/1.5 monospace; white-space: pre-wrap; }
    .pending { background: #faf5ff; border: 1px solid #e9d5ff; border-radius: 6px; padding: 8px; margin-top: 8px; }
    .artifact { font: 11px monospace; margin-top: 6px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>DevFlow Dashboard</h2>

    <div class="card" style="margin-bottom:12px">
      <div class="row">
        <input id="project-path" placeholder="/Users/.../project" style="flex:1"/>
        <button onclick="scanSkills()">스캔</button>
        <button class="primary" onclick="saveConfig()">설정 저장</button>
      </div>
      <div class="muted" style="margin-top:8px">Pipeline: <span id="pipeline-text">-</span></div>
      <div class="row" style="margin-top:8px">
        <input id="ticket-input" placeholder="RP-5316" style="flex:1"/>
        <button class="primary" onclick="addTicket()">티켓 추가</button>
      </div>
      <div id="skills" class="muted" style="margin-top:8px"></div>
    </div>

    <div class="grid">
      <div class="card"><b>Queue</b><div id="col-queued"></div></div>
      <div class="card"><b>Running</b><div id="col-running"></div></div>
      <div class="card"><b>Review</b><div id="col-review"></div></div>
      <div class="card"><b>Blocked/Halted</b><div id="col-blocked"></div></div>
    </div>
  </div>

<script>
let state = { pipeline: [], tickets: [] };
let availableSkills = [];
let editPipeline = [];
let openLogs = new Set();

function byStatus(t) {
  if (t.status === 'queued') return 'queued';
  if (t.status === 'running') return 'running';
  if (t.status === 'review' || t.status === 'done' || t.status === 'awaiting_input') return 'review';
  return 'blocked';
}

function ticketHtml(t) {
  const actions = [];
  actions.push(`<button onclick="toggleLog('${t.id}')">log</button>`);
  if (t.status === 'running') actions.push(`<button onclick="stopTicket('${t.id}')">stop</button>`);
  if (['review','awaiting_input','blocked','halted'].includes(t.status)) actions.push(`<button onclick="nextStep('${t.id}')">next</button>`);
  actions.push(`<button onclick="deleteTicket('${t.id}')">delete</button>`);

  const pending = t.pendingAction ? `<div class='pending'><div class='muted'>${esc(t.pendingAction.prompt)}</div>
    ${(t.pendingAction.options||[]).map(o=>`<button onclick="resolveAction('${t.id}','${o.id}')">${esc(o.label||o.id)}</button>`).join(' ')}</div>` : '';

  const artifacts = (t.artifacts||[]).slice(-3).map(a=>`<div class='artifact'>[${esc(a.type)}] ${esc(a.name)}</div>`).join('');

  const summary = t.summary || {};
  const detail = `<div class='muted'>latest commit: ${esc(summary.latestCommit||'-')}</div>
    <div class='muted'>issue: ${esc(summary.issue||'-')}</div>
    <div class='muted'>next action: ${esc(summary.nextAction||'-')}</div>`;

  const log = openLogs.has(t.id) ? `<div class='log'>${esc(t.log || '')}</div>` : '';
  return `<div class='ticket'>
    <div><b>${esc(t.jiraTicket)}</b> <span class='badge'>${esc(t.status)}</span></div>
    <div class='muted'>step ${t.currentStep + 1}/${Math.max(state.pipeline.length,1)} | ${esc(t.branchName || '-')}</div>
    ${detail}
    <div class='actions'>${actions.join('')}</div>
    ${pending}
    ${artifacts}
    ${log}
  </div>`;
}

function render() {
  document.getElementById('pipeline-text').textContent = state.pipeline.length ? state.pipeline.join(' → ') : '-';
  const cols = { queued: [], running: [], review: [], blocked: [] };
  for (const t of state.tickets) cols[byStatus(t)].push(t);
  for (const key of Object.keys(cols)) {
    document.getElementById(`col-${key}`).innerHTML = cols[key].map(ticketHtml).join('') || `<div class='muted' style='margin-top:8px'>비어 있음</div>`;
  }
}

async function loadConfig() {
  const res = await fetch('/api/config');
  const data = await res.json();
  document.getElementById('project-path').value = data.projectPath || '';
  availableSkills = data.availableSkills || [];
  editPipeline = [...(data.pipeline || [])];
  document.getElementById('skills').innerHTML = 'skills: ' + availableSkills.map(s => `<button onclick="toggleSkill('${s}')">${s}${editPipeline.includes(s)?'✓':''}</button>`).join(' ');
}

function toggleSkill(skill) {
  const i = editPipeline.indexOf(skill);
  if (i >= 0) editPipeline.splice(i, 1); else editPipeline.push(skill);
  loadConfigView();
}

function loadConfigView() {
  document.getElementById('skills').innerHTML = 'skills: ' + availableSkills.map(s => `<button onclick="toggleSkill('${s}')">${s}${editPipeline.includes(s)?'✓':''}</button>`).join(' ');
}

async function scanSkills() {
  const p = document.getElementById('project-path').value.trim();
  const res = await fetch(`/api/skills?projectPath=${encodeURIComponent(p)}`);
  const data = await res.json();
  availableSkills = data.skills || [];
  loadConfigView();
}

async function saveConfig() {
  const projectPath = document.getElementById('project-path').value.trim();
  await fetch('/api/config', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ projectPath, pipeline: editPipeline }) });
  refresh();
}

async function refresh() {
  const res = await fetch('/api/tickets');
  state = await res.json();
  render();
}

async function addTicket() {
  const jiraTicket = document.getElementById('ticket-input').value.trim();
  if (!jiraTicket) return;
  await fetch('/api/tickets', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ jiraTicket }) });
  document.getElementById('ticket-input').value = '';
  refresh();
}

async function resolveAction(id, actionId) {
  await fetch(`/api/tickets/${id}/actions/resolve`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ actionId })});
  refresh();
}
async function nextStep(id) { await fetch(`/api/tickets/${id}/next`, { method:'POST' }); refresh(); }
async function stopTicket(id) { await fetch(`/api/tickets/${id}/stop`, { method:'POST' }); refresh(); }
async function deleteTicket(id) { await fetch(`/api/tickets/${id}`, { method:'DELETE' }); refresh(); }
function toggleLog(id) { if (openLogs.has(id)) openLogs.delete(id); else openLogs.add(id); render(); }
function esc(s){ return String(s||'').replace(/[&<>"']/g, m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m])); }

function connectSSE() {
  const es = new EventSource('/api/events');
  es.addEventListener('ticket', (e) => {
    const incoming = JSON.parse(e.data);
    const idx = state.tickets.findIndex(t => t.id === incoming.id);
    if (idx >= 0) state.tickets[idx] = incoming; else state.tickets.unshift(incoming);
    render();
  });
  es.addEventListener('ticket_deleted', (e) => {
    const { id } = JSON.parse(e.data);
    state.tickets = state.tickets.filter(t => t.id !== id);
    render();
  });
  es.onerror = () => { setTimeout(connectSSE, 2000); };
}

loadConfig();
refresh();
connectSSE();
setInterval(refresh, 8000);
</script>
</body>
</html>
